var currentLang = "he";

function applyLang(lang) {
  var d = T[lang];
  if (!d) return;
  currentLang = lang;

  document.documentElement.setAttribute("lang", d.lang);
  document.documentElement.setAttribute("dir", d.dir);

  document.getElementById("pageTitle").textContent = d.pageTitle;
  document.getElementById("pageSubtitle").textContent = d.pageSubtitle;

  var back = document.getElementById("backLink");
  back.textContent = d.backLink;
  back.setAttribute("aria-label", d.backLinkAria);

  document.getElementById("main-content").innerHTML = d.content;
  document.getElementById("footerTxt").innerHTML = d.footer;

  var lbl = document.getElementById("langToggleBtn");
  lbl.setAttribute("aria-label", d.langChoose);
  document.getElementById("langMenu").setAttribute("aria-label", d.langAvailable);
  document.getElementById("currentLangLabel").textContent = lang.toUpperCase();

  // mark active option
  document.querySelectorAll("#langMenu [role='option']").forEach(function(el) {
    var isActive = el.getAttribute("data-label") === lang.toUpperCase();
    el.classList.toggle("active", isActive);
    el.setAttribute("aria-selected", isActive ? "true" : "false");
  });

  try { localStorage.setItem("cg_lang", lang); } catch(e) {}
}

function switchLang(lang, btn) {
  applyLang(lang);
  closeDropdown();
}

function toggleDropdown(e) {
  e.stopPropagation();
  var dd = document.getElementById("langDropdown");
  var isOpen = dd.classList.toggle("open");
  document.getElementById("langToggleBtn").setAttribute("aria-expanded", isOpen ? "true" : "false");
}

function closeDropdown() {
  var dd = document.getElementById("langDropdown");
  dd.classList.remove("open");
  document.getElementById("langToggleBtn").setAttribute("aria-expanded", "false");
}

document.addEventListener("click", function(e) {
  var dd = document.getElementById("langDropdown");
  if (dd && !dd.contains(e.target)) closeDropdown();
});

document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") closeDropdown();
});

// keyboard nav for lang options
document.getElementById("langMenu").addEventListener("keydown", function(e) {
  var opts = Array.from(this.querySelectorAll("[role='option']"));
  var idx = opts.indexOf(document.activeElement);
  if (e.key === "ArrowDown") { e.preventDefault(); opts[(idx+1) % opts.length].focus(); }
  if (e.key === "ArrowUp")   { e.preventDefault(); opts[(idx-1+opts.length) % opts.length].focus(); }
  if (e.key === "Enter" || e.key === " ") { e.preventDefault(); if (idx>=0) opts[idx].click(); }
});

// init
(function() {
  var saved;
  try { saved = localStorage.getItem("cg_lang"); } catch(e) {}
  applyLang(T[saved] ? saved : "he");
})();
</script>
